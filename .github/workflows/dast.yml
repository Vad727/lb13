name: DAST Audio Security Gate

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dast:
    name: Run DAST pytest scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsndfile1 python3-tk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas scipy scikit-learn==1.7.2 joblib librosa soundfile pytest

      - name: Check model file
        run: |
          test -f model/voice_random_forest_model_bundle.joblib

      - name: Create DAST test inputs
        run: |
          python lab13_dast/create_test_inputs.py

      - name: Run DAST tests
        shell: bash
        run: |
          mkdir -p lab13_dast/reports
          set +e
          python -m pytest lab13_dast/test_dast_audio_inputs.py -v --tb=short | tee lab13_dast/reports/dast_pytest_report.txt
          PYTEST_EXIT=${PIPESTATUS[0]}
          echo "$PYTEST_EXIT" > lab13_dast/reports/pytest_exit_code.txt
          set -e

      - name: Upload DAST report artifact
        uses: actions/upload-artifact@v4
        with:
          name: dast-reports
          path: |
            lab13_dast/reports/dast_pytest_report.txt
            lab13_dast/reports/pytest_exit_code.txt
          retention-days: 7

  security_gate:
    name: DAST Security Gate
    runs-on: ubuntu-latest
    needs: dast

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download DAST reports
        uses: actions/download-artifact@v5
        with:
          name: dast-reports
          path: lab13_dast/reports

      - name: Run DAST Security Gate
        run: |
          python lab13_dast/security_gate_dast.py \
            --report lab13_dast/reports/dast_pytest_report.txt \
            --exit-code-file lab13_dast/reports/pytest_exit_code.txt \
            --threshold high \
            --ignore-file lab13_dast/.dastignore
